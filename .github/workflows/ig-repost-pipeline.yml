name: Instagram Repost Pipeline

on:
  schedule:
    # Every 2 hours with in-hour backup wake-ups. The pipeline skips if a
    # successful/partial scan already ran recently, so backup wakes are safe.
    - cron: '7 */2 * * *'
    - cron: '17 */2 * * *'
    - cron: '47 */2 * * *'
  workflow_dispatch:
    inputs:
      mode:
        description: 'Pipeline mode: scan, validate, process-queue, sync-avatars, cover-test'
        required: false
        default: 'scan'
      username:
        description: 'Instagram username for validation runs'
        required: false
        default: ''
      reason:
        description: 'Optional dispatch reason'
        required: false
        default: ''

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

concurrency:
  group: ig-repost-pipeline
  cancel-in-progress: false

jobs:
  repost-worker:
    runs-on: ubuntu-latest
    timeout-minutes: 45

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Cache Puppeteer Browser
        id: cache-puppeteer
        uses: actions/cache@v4
        with:
          path: ~/.cache/puppeteer
          key: ${{ runner.os }}-puppeteer-${{ hashFiles('package-lock.json') }}

      - name: Install automation dependencies
        run: npm ci --omit=dev

      - name: Install Puppeteer Browser
        if: steps.cache-puppeteer.outputs.cache-hit != 'true'
        run: npx puppeteer browsers install chrome

      - name: Install ffmpeg (smart cover extraction)
        run: sudo apt-get update -qq && sudo apt-get install -y ffmpeg

      - name: Test smart cover extraction
        if: ${{ github.event.inputs.mode == 'cover-test' }}
        run: node scripts/test-ig-cover-service.js

      - name: Run IG repost pipeline
        if: ${{ github.event.inputs.mode != 'cover-test' }}
        run: node scripts/run-ig-repost-pipeline.js
        env:
          NODE_ENV: production
          IG_REPOST_MODE: ${{ github.event.inputs.mode || 'scan' }}
          IG_REPOST_USERNAME: ${{ github.event.inputs.username || '' }}
          IG_REPOST_REASON: ${{ github.event.inputs.reason || '' }}
          IG_REPOST_MAX_NEW_PER_ACCOUNT: 1
          IG_REPOST_MAX_POSTS_PER_RUN: 2
          IG_REPOST_MAX_ATTEMPTS: 3
          IG_REPOST_MIN_SCHEDULE_GAP_MINUTES: 90
          IG_REPOST_RETRY_BASE_MINUTES: 30
          IG_REPOST_REQUIRE_PINNED_DETECTION: 'true'
          IG_REPOST_PINTEREST_SESSION_COOKIE: ${{ secrets.IG_REPOST_PINTEREST_SESSION_COOKIE }}
          PINTEREST_SESSION_COOKIE: ${{ secrets.PINTEREST_SESSION_COOKIE }}
          IG_REPOST_INSTAGRAM_SESSION_COOKIE: ${{ secrets.IG_REPOST_INSTAGRAM_SESSION_COOKIE }}
          INSTAGRAM_SESSION_COOKIE: ${{ secrets.INSTAGRAM_SESSION_COOKIE }}
          APP_IG_REPOST_STATE_KEY: ${{ secrets.APP_IG_REPOST_STATE_KEY || 'ig_repost_pipeline_state_v1' }}
          APP_IG_TRACKER_STATE_KEY: ${{ secrets.APP_IG_TRACKER_STATE_KEY || 'ig_tracker_state_v1' }}
          UPSTASH_REDIS_REST_URL: ${{ secrets.UPSTASH_REDIS_REST_URL }}
          UPSTASH_REDIS_REST_TOKEN: ${{ secrets.UPSTASH_REDIS_REST_TOKEN }}
          AI_API_KEY: ${{ secrets.AI_API_KEY }}
          AI_MODEL: ${{ secrets.AI_MODEL }}
          AI_BASE_URL: ${{ secrets.AI_BASE_URL }}
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
          GEMINI_FALLBACK_API_KEY: ${{ secrets.GEMINI_FALLBACK_API_KEY }}
          EARNKARO_SESSION_COOKIE: ${{ secrets.EARNKARO_SESSION_COOKIE }}
          AMAZON_ASSOCIATE_TAG: ${{ secrets.AMAZON_ASSOCIATE_TAG }}
          AMAZON_MARKETPLACE: ${{ secrets.AMAZON_MARKETPLACE || 'www.amazon.in' }}
          APP_BASE_URL: ${{ secrets.APP_BASE_URL || 'https://pinterest-autopost.vercel.app' }}
          SERPER_API_KEY: ${{ secrets.SERPER_API_KEY }}
          SERPER_API_KEY_BACKUP: ${{ secrets.SERPER_API_KEY_BACKUP }}
          RAPIDAPI_KEY: ${{ secrets.RAPIDAPI_KEY }}
          APIFY_API_TOKEN: ${{ secrets.APIFY_API_TOKEN }}
          APIFY_API_TOKEN_BACKUP: ${{ secrets.APIFY_API_TOKEN_BACKUP }}
          GITHUB_TOKEN: ${{ secrets.GH_PAT }}
