name: Pinterest Image Automation

on:
  schedule:
    # Publisher: runs every hour and posts queued image pins.
    - cron: '0 * * * *'
    # Sync: runs once a week (Sunday midnight UTC) to refill the image queue.
    - cron: '0 0 * * 0'
  workflow_dispatch:
    inputs:
      mode:
        description: 'Mode to run: "publish" (post pins) or "sync" (refill queue)'
        required: true
        default: 'publish'
        type: choice
        options:
          - publish
          - sync
      username:
        description: 'Target Pinterest username to scrape in sync mode'
        required: false
        default: ''
      publish_after_sync:
        description: 'After sync, immediately publish the first batch'
        required: false
        default: 'false'
      max_posts:
        description: 'Maximum pins to publish in one run'
        required: false
        default: '6'

permissions:
  contents: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  publisher:
    name: Pinterest Image Publisher
    runs-on: ubuntu-latest
    timeout-minutes: 20
    if: |
      (github.event_name == 'schedule' && github.event.schedule == '0 * * * *') ||
      (github.event_name == 'workflow_dispatch' && github.event.inputs.mode == 'publish')

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install Dependencies
        run: npm ci

      - name: Cache Puppeteer Chrome
        id: cache-puppeteer
        uses: actions/cache@v4
        with:
          path: ~/.cache/puppeteer
          key: ${{ runner.os }}-puppeteer-${{ hashFiles('package-lock.json') }}

      - name: Install Puppeteer Chrome
        if: steps.cache-puppeteer.outputs.cache-hit != 'true'
        run: npx puppeteer browsers install chrome

      - name: Publish queued Pinterest image pins
        env:
          PINTEREST_ACCESS_TOKEN: ${{ secrets.PINTEREST_ACCESS_TOKEN }}
          PINTEREST_IMAGE_TARGET_BOARD: ${{ secrets.PINTEREST_IMAGE_TARGET_BOARD || secrets.PINTEREST_TARGET_BOARD }}
          PINTEREST_IMAGE_BOARD_NAME: ${{ secrets.PINTEREST_IMAGE_BOARD_NAME || 'pinss' }}
          PINTEREST_IMAGE_MAX_POSTS_PER_RUN: ${{ github.event.inputs.max_posts || 6 }}
          AI_API_KEY: ${{ secrets.AI_API_KEY }}
          AI_MODEL: ${{ secrets.AI_MODEL }}
          AI_BASE_URL: ${{ secrets.AI_BASE_URL }}
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
          GEMINI_API_KEY: ${{ secrets.AI_API_KEY }}
          GEMINI_FALLBACK_API_KEY: ${{ secrets.GEMINI_FALLBACK_API_KEY }}
          GH_TOKEN: ${{ secrets.GH_PAT }}
          APP_BASE_URL: ${{ secrets.APP_BASE_URL || secrets.BASE_URL }}
          UPSTASH_REDIS_REST_URL: ${{ secrets.UPSTASH_REDIS_REST_URL }}
          UPSTASH_REDIS_REST_TOKEN: ${{ secrets.UPSTASH_REDIS_REST_TOKEN }}
          APP_PINTEREST_IMAGE_STATE_KEY: ${{ secrets.APP_PINTEREST_IMAGE_STATE_KEY || 'pinterest_image_state_v1' }}
        run: node scripts/pinterest-image-publish.js

      - name: Commit updated Pinterest image state
        run: |
          git config --global user.name 'github-actions[bot]'
          git config --global user.email 'github-actions[bot]@users.noreply.github.com'
          git add data/pinterest-image-queue.json data/pinterest-image-posted.json data/pinterest-image-logs.json || true
          git diff --quiet && git diff --staged --quiet || git commit -m "chore: update Pinterest image publish state [skip ci]"
          git push

  sync:
    name: Pinterest Image Sync
    runs-on: ubuntu-latest
    timeout-minutes: 60
    if: |
      (github.event_name == 'schedule' && github.event.schedule == '0 0 * * 0') ||
      (github.event_name == 'workflow_dispatch' && github.event.inputs.mode == 'sync')

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install Dependencies
        run: npm ci

      - name: Cache Puppeteer Chrome
        id: cache-puppeteer
        if: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.publish_after_sync == 'true' }}
        uses: actions/cache@v4
        with:
          path: ~/.cache/puppeteer
          key: ${{ runner.os }}-puppeteer-${{ hashFiles('package-lock.json') }}

      - name: Install Puppeteer Chrome
        if: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.publish_after_sync == 'true' && steps.cache-puppeteer.outputs.cache-hit != 'true' }}
        run: npx puppeteer browsers install chrome

      - name: Sync Pinterest image sources
        env:
          APIFY_API_TOKEN: ${{ secrets.APIFY_API_TOKEN }}
          PINTEREST_IMAGE_USERNAME: ${{ github.event.inputs.username }}
          PINTEREST_IMAGE_SCRAPE_LIMIT: 2000
          APP_BASE_URL: ${{ secrets.APP_BASE_URL || secrets.BASE_URL }}
          UPSTASH_REDIS_REST_URL: ${{ secrets.UPSTASH_REDIS_REST_URL }}
          UPSTASH_REDIS_REST_TOKEN: ${{ secrets.UPSTASH_REDIS_REST_TOKEN }}
          APP_PINTEREST_IMAGE_STATE_KEY: ${{ secrets.APP_PINTEREST_IMAGE_STATE_KEY || 'pinterest_image_state_v1' }}
        run: node scripts/pinterest-image-sync.js

      - name: Publish first batch after sync
        if: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.publish_after_sync == 'true' }}
        env:
          PINTEREST_ACCESS_TOKEN: ${{ secrets.PINTEREST_ACCESS_TOKEN }}
          PINTEREST_IMAGE_TARGET_BOARD: ${{ secrets.PINTEREST_IMAGE_TARGET_BOARD || secrets.PINTEREST_TARGET_BOARD }}
          PINTEREST_IMAGE_BOARD_NAME: ${{ secrets.PINTEREST_IMAGE_BOARD_NAME || 'pinss' }}
          PINTEREST_IMAGE_MAX_POSTS_PER_RUN: ${{ github.event.inputs.max_posts || 6 }}
          AI_API_KEY: ${{ secrets.AI_API_KEY }}
          AI_MODEL: ${{ secrets.AI_MODEL }}
          AI_BASE_URL: ${{ secrets.AI_BASE_URL }}
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
          GEMINI_API_KEY: ${{ secrets.AI_API_KEY }}
          GEMINI_FALLBACK_API_KEY: ${{ secrets.GEMINI_FALLBACK_API_KEY }}
          GH_TOKEN: ${{ secrets.GH_PAT }}
          APP_BASE_URL: ${{ secrets.APP_BASE_URL || secrets.BASE_URL }}
          UPSTASH_REDIS_REST_URL: ${{ secrets.UPSTASH_REDIS_REST_URL }}
          UPSTASH_REDIS_REST_TOKEN: ${{ secrets.UPSTASH_REDIS_REST_TOKEN }}
          APP_PINTEREST_IMAGE_STATE_KEY: ${{ secrets.APP_PINTEREST_IMAGE_STATE_KEY || 'pinterest_image_state_v1' }}
        run: node scripts/pinterest-image-publish.js

      - name: Commit updated Pinterest image queue
        run: |
          git config --global user.name 'github-actions[bot]'
          git config --global user.email 'github-actions[bot]@users.noreply.github.com'
          git add data/pinterest-image-accounts.json data/pinterest-image-queue.json data/pinterest-image-pins.json data/pinterest-image-logs.json || true
          git diff --quiet && git diff --staged --quiet || git commit -m "chore: sync Pinterest image sources [skip ci]"
          git push
