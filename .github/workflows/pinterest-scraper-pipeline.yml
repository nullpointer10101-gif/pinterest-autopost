name: Pinterest Scraper Pipeline

on:
  schedule:
    # Run every hour to pop 2 pins from the queue
    - cron: '0 * * * *'
  workflow_dispatch:
    inputs:
      username:
        description: 'Target Pinterest Username (leave blank to run all)'
        required: false
        default: ''

jobs:
  run-scraper:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v3

      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install Dependencies
        run: npm ci

      - name: Run Pinterest Pipeline
        env:
          APIFY_API_TOKEN: ${{ secrets.APIFY_API_TOKEN }}
          PINTEREST_TARGET_USERNAME: ${{ github.event.inputs.username }}
          BASE_URL: ${{ secrets.BASE_URL }}
        run: node scripts/run-pinterest-pipeline.js

      - name: Commit and Push Updated Data
        run: |
          git config --global user.name 'github-actions[bot]'
          git config --global user.email 'github-actions[bot]@users.noreply.github.com'
          git add data/pinterest_pins.json
          git diff --quiet && git diff --staged --quiet || (git commit -m "Auto-update: Scraped new Pinterest pins" && git push)
