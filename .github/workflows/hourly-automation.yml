name: Unlimited Pinterest Automation (Public Mode)

on:
  schedule:
    # Every 2 hours (offset by 20 minutes from the repost pipeline to ensure new items are queued first)
    - cron: '20 */2 * * *'
    - cron: '30 */2 * * *'
    - cron: '50 */2 * * *'
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

# Prevent multiple automation missions or fire-posts from running at the same time
concurrency:
  group: fire-post
  cancel-in-progress: false

jobs:
  automation-mission:
    runs-on: ubuntu-latest
    timeout-minutes: 90

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Cache Puppeteer Browser
        id: cache-puppeteer
        uses: actions/cache@v4
        with:
          path: ~/.cache/puppeteer
          key: ${{ runner.os }}-puppeteer-${{ hashFiles('package-lock.json') }}

      - name: Install automation dependencies
        run: npm ci --omit=dev

      - name: Install Puppeteer Browser
        if: steps.cache-puppeteer.outputs.cache-hit != 'true'
        run: npx puppeteer browsers install chrome

      - name: Install ffmpeg (smart thumbnail extraction)
        run: sudo apt-get install -y ffmpeg

      - name: Run automation mission
        run: node scripts/run-hourly-automation.js
        env:
          NODE_ENV: production
          AUTOMATION_TIMEZONE: ${{ secrets.AUTOMATION_TIMEZONE || 'Asia/Calcutta' }}
          AUTOMATION_MAX_POSTS_PER_DAY: 100
          AUTOMATION_MAX_POSTS_PER_RUN: 5
          AUTOMATION_ENGAGEMENTS_PER_HOUR: 8
          AUTOMATION_ENGAGEMENT_NICHE: mens_outfits
          AUTOMATION_ENGAGEMENT_LIKE_TARGET: 5
          AUTOMATION_ENGAGEMENT_COMMENT_TARGET: 3
          AUTOMATION_ENGAGEMENTS_HARD_CAP: 10
          # Public repo = unlimited minutes: safe human-like delays, no cost concern
          AUTOMATION_ENGAGEMENT_START_JITTER_MIN_MS: 60000
          AUTOMATION_ENGAGEMENT_START_JITTER_MAX_MS: 180000
          AUTOMATION_ENGAGEMENT_MIN_GAP_MS: 180000
          AUTOMATION_ENGAGEMENT_MAX_GAP_MS: 480000
          AUTOMATION_SECRET: ${{ secrets.AUTOMATION_SECRET }}
          PINTEREST_POSTING_MODE: bot
          PINTEREST_SESSION_COOKIE: ${{ secrets.PINTEREST_SESSION_COOKIE }}
          PINTEREST_ACCESS_TOKEN: ${{ secrets.PINTEREST_ACCESS_TOKEN }}
          PINTEREST_REFRESH_TOKEN: ${{ secrets.PINTEREST_REFRESH_TOKEN }}
          PINTEREST_APP_ID: ${{ secrets.PINTEREST_APP_ID }}
          # Queue content prep & affiliate auth
          RAPIDAPI_KEY: ${{ secrets.RAPIDAPI_KEY }}
          EARNKARO_SESSION_COOKIE: ${{ secrets.EARNKARO_SESSION_COOKIE }}
          AMAZON_ASSOCIATE_TAG: ${{ secrets.AMAZON_ASSOCIATE_TAG }}
          AMAZON_MARKETPLACE: ${{ secrets.AMAZON_MARKETPLACE || 'www.amazon.in' }}
          # AI Config
          AI_API_KEY: ${{ secrets.AI_API_KEY }}
          AI_MODEL: ${{ secrets.AI_MODEL }}
          AI_BASE_URL: ${{ secrets.AI_BASE_URL }}
          UPSTASH_REDIS_REST_URL: ${{ secrets.UPSTASH_REDIS_REST_URL }}
          UPSTASH_REDIS_REST_TOKEN: ${{ secrets.UPSTASH_REDIS_REST_TOKEN }}
          APP_STATE_KEY: ${{ secrets.APP_STATE_KEY || 'pinterest_autopost_state_v1' }}
          GEMINI_API_KEY: ${{ secrets.AI_API_KEY }}
          # 3-Layer AI Fallback
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
          GEMINI_FALLBACK_API_KEY: ${{ secrets.GEMINI_FALLBACK_API_KEY }}
          APP_BASE_URL: ${{ secrets.APP_BASE_URL }}
          GH_TOKEN: ${{ secrets.GH_PAT }}
          # GOOGLE_CSE_KEY: ${{ secrets.GOOGLE_CSE_KEY }}  # reserved for future
          # GOOGLE_CSE_CX: ${{ secrets.GOOGLE_CSE_CX }}  # reserved for future
          SERPER_API_KEY: ${{ secrets.SERPER_API_KEY }}
          SERPER_API_KEY_BACKUP: ${{ secrets.SERPER_API_KEY_BACKUP }}
