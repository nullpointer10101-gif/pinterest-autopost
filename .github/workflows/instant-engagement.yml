name: Instant Pinterest Engagement (Algorithm Booster)

on:
  workflow_dispatch:
    inputs:
      count:
        description: 'Number of pins to engage'
        required: false
        default: '3'
      niche:
        description: 'Target niche (fashion|home|all)'
        required: false
        default: 'all'

jobs:
  engagement-mission:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Cache Puppeteer Browser
        id: cache-puppeteer
        uses: actions/cache@v4
        with:
          path: ~/.cache/puppeteer
          key: ${{ runner.os }}-puppeteer-${{ hashFiles('package-lock.json') }}

      - name: Install dependencies (Production only)
        run: npm ci --omit=dev

      - name: Install Puppeteer Browser
        if: steps.cache-puppeteer.outputs.cache-hit != 'true'
        run: npx puppeteer browsers install chrome

      - name: Run Instant Engagement
        run: node scripts/run-hourly-automation.js
        env:
          NODE_ENV: production
          AUTOMATION_TIMEZONE: ${{ secrets.AUTOMATION_TIMEZONE || 'Asia/Calcutta' }}
          AUTOMATION_MAX_POSTS_PER_DAY: 0 # Skip posts
          AUTOMATION_MAX_POSTS_PER_RUN: 0 # Skip posts
          AUTOMATION_ENGAGEMENTS_PER_HOUR: ${{ github.event.inputs.count || '2' }}
          AUTOMATION_ENGAGEMENT_NICHE: ${{ github.event.inputs.niche || 'all' }}
          AUTOMATION_ENGAGEMENT_START_JITTER_MIN_MS: 0 # No wait for manual trigger
          AUTOMATION_ENGAGEMENT_START_JITTER_MAX_MS: 5000 # Max 5s wait
          AUTOMATION_ENGAGEMENT_MIN_GAP_MS: 15000 # Fast gaps for manual booster
          AUTOMATION_ENGAGEMENT_MAX_GAP_MS: 45000
          AUTOMATION_SECRET: ${{ secrets.AUTOMATION_SECRET }}
          PINTEREST_POSTING_MODE: bot
          PINTEREST_SESSION_COOKIE: ${{ secrets.PINTEREST_SESSION_COOKIE }}
          AI_API_KEY: ${{ secrets.AI_API_KEY }}
          UPSTASH_REDIS_REST_URL: ${{ secrets.UPSTASH_REDIS_REST_URL }}
          UPSTASH_REDIS_REST_TOKEN: ${{ secrets.UPSTASH_REDIS_REST_TOKEN }}
          APP_STATE_KEY: ${{ secrets.APP_STATE_KEY || 'pinterest_autopost_state_v1' }}
