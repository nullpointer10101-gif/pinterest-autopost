<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pinterest Command Center</title>
    <link rel="stylesheet" href="/css/style.css">
    <link rel="shortcut icon" href="https://www.pinterest.com/favicon.ico" type="image/x-icon">
</head>
<body>

    <div class="container">
        <header>
            <div class="logo-text">Pinterest Command</div>
            <div id="connection-status" class="badge badge-success">Cloud Bot Online</div>
        </header>

        <section class="stats-bar">
            <div class="glass-card">
                <div class="stat-label">Total Published</div>
                <div class="stat-value" id="stat-total-posts">0</div>
            </div>
            <div class="glass-card">
                <div class="stat-label">Active Queue</div>
                <div class="stat-value" id="stat-queue-pending">0</div>
            </div>
            <div class="glass-card">
                <div class="stat-label">Success Rate</div>
                <div class="stat-value" id="stat-success-rate">0%</div>
            </div>
        </section>

        <nav class="tabs">
            <button class="tab active" id="tab-dashboard" onclick="switchTab('dashboard')">Mission Control</button>
            <button class="tab" id="tab-queue" onclick="switchTab('queue')">Queue</button>
            <button class="tab" id="tab-history" onclick="switchTab('history')">History</button>
            <button class="tab" id="tab-settings" onclick="switchTab('settings')">Settings</button>
        </nav>

        <div id="panel-dashboard" class="panel">
            <div class="grid-main">
                <div class="glass-card">
                    <h3 style="margin-bottom: 20px;">Deploy New Mission</h3>
                    <div style="display: flex; gap: 12px; margin-bottom: 20px;">
                        <input type="text" id="reel-url" placeholder="Instagram Reel URL...">
                        <button class="btn btn-primary" onclick="handleFetch()">Extract</button>
                    </div>

                    <div id="preview-section" class="hidden">
                        <div style="display: flex; gap: 24px; margin-top: 20px; animation: slideUp 0.3s ease;">
                            <img id="preview-img" style="width: 180px; border-radius: 16px; border: 1px solid var(--border);">
                            <div style="flex: 1;">
                                <div style="margin-bottom: 12px;">
                                    <label class="stat-label">Title</label>
                                    <input type="text" id="field-title">
                                </div>
                                <div style="margin-bottom: 20px;">
                                    <label class="stat-label">Description</label>
                                    <textarea id="field-desc" rows="5"></textarea>
                                </div>
                                <div style="display: flex; gap: 12px;">
                                    <button class="btn btn-primary" style="flex: 1;" onclick="handlePost()">Post Now</button>
                                    <button class="btn" style="flex: 1; background: rgba(255,255,255,0.05); color: #fff; border: 1px solid var(--border);" onclick="handleQueue()">Queue</button>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>

                <div class="glass-card">
                    <h3 style="margin-bottom: 20px;">Recent Activity</h3>
                    <div id="queue-list-mini"></div>
                    <button class="btn" style="width: 100%; margin-top: 20px; background: rgba(255,255,255,0.05); color: #fff; border: 1px solid var(--border);" onclick="processQueueNow()">Trigger Now</button>
                </div>
            </div>
        </div>

        <section id="panel-queue" class="panel hidden">
            <div class="glass-card">
                <h3 style="margin-bottom: 20px;">Full Mission Queue</h3>
                <div id="queue-list"></div>
            </div>
        </section>

        <section id="panel-history" class="panel hidden">
            <div class="glass-card">
                <h3 style="margin-bottom: 20px;">Activity History</h3>
                <div id="history-list"></div>
            </div>
        </section>

        <section id="panel-settings" class="panel hidden">
            <div class="grid-main">
                <div class="glass-card">
                    <h3 style="margin-bottom: 20px;">Pinterest Config</h3>
                    <div style="display: flex; flex-direction: column; gap: 16px;">
                        <a href="/api/pinterest/auth" class="btn btn-primary" style="text-align: center; text-decoration: none;">Link Pinterest Account</a>
                        <div>
                            <label class="stat-label">Manual Session Cookie</label>
                            <div style="display: flex; gap: 10px;">
                                <input type="password" id="session-cookie">
                                <button class="btn" style="background: rgba(255,255,255,0.05); color: #fff; border: 1px solid var(--border);" onclick="linkSessionCookie()">Link</button>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </section>

    </div>

    <script src="/js/app.js"></script>
</body>
</html>
