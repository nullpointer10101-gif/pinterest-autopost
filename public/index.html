<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pinterest Dashboard</title>
    <link rel="stylesheet" href="/css/style.css">
</head>
<body>

    <div class="container">
        <header>
            <div class="logo">Pinterest Auto</div>
            <div id="status-badge" class="badge badge-success">Online</div>
        </header>

        <section class="stats">
            <div class="stat-card">
                <div class="stat-label">Total Published</div>
                <div class="stat-value" id="stat-total">0</div>
            </div>
            <div class="stat-card">
                <div class="stat-label">Queue</div>
                <div class="stat-value" id="stat-queue">0</div>
            </div>
            <div class="stat-card">
                <div class="stat-label">Success Rate</div>
                <div class="stat-value" id="stat-rate">0%</div>
            </div>
        </section>

        <div class="main-grid">
            <main>
                <div class="card">
                    <h2 class="card-title">Create New Pin</h2>
                    <div class="input-group">
                        <input type="text" id="reel-url" placeholder="Paste Instagram Reel URL here...">
                        <button class="btn btn-primary" onclick="handleFetch()">Extract</button>
                    </div>

                    <div id="preview-section" class="hidden">
                        <div style="display: flex; gap: 20px; margin-top: 20px;">
                            <img id="preview-img" style="width: 150px; border-radius: 8px;">
                            <div style="flex: 1;">
                                <input type="text" id="field-title" placeholder="Title" style="margin-bottom: 10px;">
                                <textarea id="field-desc" rows="4" placeholder="Description"></textarea>
                                <div style="display: flex; gap: 10px; margin-top: 15px;">
                                    <button class="btn btn-primary" style="flex: 1;" onclick="handlePost()">Post Now</button>
                                    <button class="btn" style="flex: 1; border: 1px solid #ddd;" onclick="handleQueue()">Queue</button>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>

                <div class="card">
                    <h2 class="card-title">Recent Activity</h2>
                    <div id="history-list"></div>
                </div>
            </main>

            <aside>
                <div class="card">
                    <h2 class="card-title">Mission Queue</h2>
                    <div id="queue-list"></div>
                    <button class="btn" style="width: 100%; margin-top: 15px; border: 1px solid #ddd;" onclick="processQueueNow()">Trigger Bot</button>
                </div>

                <div class="card">
                    <h2 class="card-title">Settings</h2>
                    <div style="display: flex; flex-direction: column; gap: 10px;">
                        <a href="/api/pinterest/auth" class="btn btn-primary" style="text-align: center; text-decoration: none;">Link Pinterest</a>
                        <input type="password" id="session-cookie" placeholder="Session Cookie">
                        <button class="btn" style="border: 1px solid #ddd;" onclick="linkSessionCookie()">Update Cookie</button>
                    </div>
                </div>
            </aside>
        </div>
    </div>

    <script src="/js/app.js"></script>
</body>
</html>
